name: Deploy to InfinityFree

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ftp-deploy:
    name: FTP deploy
    runs-on: ubuntu-latest
    steps:
      # Si este repo no tiene FTP_SERVER configurado (caso: repo plantilla),
      # el workflow se ejecuta pero no despliega nada. Los repos hijos sí
      # configuran sus secrets en Settings > Secrets and variables > Actions
      # y este step les marca "configured=true" para activar los siguientes.
      - name: Detect FTP configuration
        id: ftp_check
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          if [ -n "$FTP_SERVER" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "FTP_SERVER configurado; este repo desplegará al servidor."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "FTP_SERVER no está configurado; modo plantilla, se omite el deploy."
          fi

      - name: Checkout
        if: steps.ftp_check.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Sync via FTP
        if: steps.ftp_check.outputs.configured == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./
          # No usar dangerous-clean-slate: queremos respetar archivos que ya están en el servidor.
          dangerous-clean-slate: false
          # Archivos/carpetas que NUNCA se mandan por FTP.
          # tools/ son herramientas locales del desarrollador (provisioning, scripts);
          # no son codigo de produccion y no deben llegar al servidor.
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            tools/**
            README.md
            mail_config.php
            db_config.php
            admin_bootstrap.php
            app_config.php
            *.log
            uploads/**
            *.sql
